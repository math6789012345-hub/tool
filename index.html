<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            body {
                margin: 0 auto;
            }
            #logo-container-tool {
                position: sticky;
                top: 0px;
                z-index: 100;
                height: 64px;
                background-color: #00000030;
                border-bottom: 5px solid #00000031;
            }
            #logo-icon-tool {
                float: left;
                padding: 10px;
                animation-name: spin-animation;
                animation-duration: 1s;
                animation-iteration-count: infinite;
                animation-timing-function: linear;
            }
            @keyframes spin-animation {
                100% {
                    transform: rotate(360deg);
                }
            }
            #logo-name-tool {
                float: left;
                padding: 11px;
                font-size: 36px;
            }
            #search-tool {
                width: 90%;
                height: 40px;
                border: 2px solid black;
                border-radius: 10px;
                padding: 2px;
                margin: 0 auto;
            }
            #search-tool > input{
                float: left;
                width: 85%;
                height: 40px;
                border: 2px solid black;
                border-radius: 10px 0 0 10px;
            }
            #search-tool-button {
                float: left;
                width: 15%;
                height: 40px;
                border: 2px solid black;
                border-radius: 0 10px 10px 0;
            }
            #tools-container {
                display: flex;
                flex-flow: wrap;
                justify-content: center;
                align-items: center;
                gap: 25px;
            }
            .tool-container {
                display: block;
                border: 2.5px solid black;
                border-radius: 20px;
                width: 120px;
                box-shadow: 0px 0px 10px black;
            }
            .tool-icon-container {
                display: block;
                text-align: center;
                padding-top: 10px;
                padding-bottom: 5px;
            }
            .tool-icon {
                font-size: 96px;
            }
            .tool-name-container {
            }
            .tool-name {
                display: block;
                text-align: center;
                font-size: 20px;
                overflow: hidden;
                overflow-wrap: break-word;
                padding-bottom: 10px;
            }
            
        </style>
    </head>
    <body>
        <div id="logo-container-tool">
            <span id="logo-icon-tool" class="material-symbols-outlined" style="font-size: 48px;">settings</span>
            <span id="logo-name-tool">Tools</span>
        </div>
        <br>
        <div id="search-tool">
            <input type="search" placeholder="Search Tool...">
            <button id="search-tool-button"><span class="material-symbols-outlined">search</span></button>
        </div>
        <br>
        <div id="tools-container">
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-file"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Export Text File</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-file"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Merge PDFs</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-clock-o"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Clock</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-code"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Base64 Encoding-Decoding</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-code"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Get Source Code</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-edit"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Text Converter</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon fa fa-code"></span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Codeforces Problemset</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon ">i</span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Tool</span>
                </div>
            </div>

                <div class="tool-icon-container">
                    <span class="tool-icon ">i</span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Tool</span>
                </div>
            </div>

                <div class="tool-icon-container">
                    <span class="tool-icon ">i</span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Tool</span>
                </div>
            </div>
            <div class="tool-container">
                <div class="tool-icon-container">
                    <span class="tool-icon ">i</span>
                </div>
                <div class="tool-name-container">
                    <span class="tool-name">Tool</span>
                </div>
            </div>
        </div>
        <script>
            let i, j, k;
            document.querySelectorAll(".tool-container").forEach(item => {
                item.addEventListener("click", () => {
                    window.open(item.querySelector(".tool-name").innerText.toLowerCase().replaceAll(" ", "-") + ".html", "_blank");
                });
            });
            document.querySelector("#search-tool").querySelector("input").addEventListener("input", () => {
                document.querySelectorAll(".tool-container").forEach(item => {
                    if(!item.querySelector(".tool-name").innerText.toLowerCase().includes(document.querySelector("#search-tool").querySelector("input").value.toLowerCase())){
                        item.style.display = "none";
                    }else{
                        item.style.display = "block";
                    }
                });
            });
            document.querySelector("#search-tool-button").addEventListener("click", () => {
                alert("Unnecessary Button");
            });
        </script>
    </body>
    </html>
