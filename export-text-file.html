<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Text Exporter</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: 40px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            margin: 20px 0;
            outline-color: var(--primary);
        }

        button {
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-main:hover { background: var(--primary-hover); }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.8rem; color: #64748b; font-weight: bold; }
        
        /* Styled Inputs */
        .input-group input { 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 4px; 
            font-size: 14px;
        }
        .input-group input:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .modal-actions { display: flex; gap: 10px; }
        .btn-download { background: #10b981; color: white; flex: 2; }
        .btn-cancel { background: #f1f5f9; color: #475569; flex: 1; }
    </style>
</head>
<body>

    <a href="index.html" class="home-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
    </a>

    <div class="container">
        <h2>Export Your Text</h2>
        <textarea id="userInput" placeholder="Write something here..."></textarea>
        <button class="btn-main" onclick="openExportModal()">Export</button>
    </div>

    <div id="modalOverlay">
        <div class="modal-content">
            <h3>Download File</h3>
            
            <div class="input-group">
                <label>File Name</label>
                <input type="text" id="fileName" onfocus="this.select()">
            </div>

            <div class="input-group">
                <label>Extension</label>
                <input type="text" id="fileExt" value="txt" onfocus="this.select()">
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
                <button class="btn-download" onclick="downloadFile()">Download</button>
            </div>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
        }

        function openExportModal() {
            const numericalTimestamp = Date.now();
            document.getElementById('fileName').value = `text_${numericalTimestamp}`;
            toggleModal(true);
        }

        function downloadFile() {
            const textContent = document.getElementById('userInput').value;
            const name = document.getElementById('fileName').value || 'file';
            const ext = document.getElementById('fileExt').value || 'txt';
            
            const blob = new Blob([textContent], { type: 'text/plain' });
            const link = document.createElement('a');
            
            link.href = URL.createObjectURL(blob);
            link.download = `${name}.${ext}`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            toggleModal(false);
        }
    </script>

</body>
</html>
