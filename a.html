        function downloadAllFiles() {
            fileIds.forEach((id, index) => {
                // Generate the direct download URL for each ID
                const downloadUrl = `https://docs.google.com/uc?export=download&id=${id}`;
                
                // Staggering the downloads by 400ms keeps the browser from blocking 
                // the requests as spam or crashing.
                setTimeout(() => {
                    const hiddenAnchor = document.createElement('a');
                    hiddenAnchor.href = downloadUrl;
                    hiddenAnchor.setAttribute('download', '');
                    hiddenAnchor.style.display = 'none';
                    
                    document.body.appendChild(hiddenAnchor);
                    hiddenAnchor.click();
                    document.body.removeChild(hiddenAnchor);
                }, index * 400); 
            });
        }
