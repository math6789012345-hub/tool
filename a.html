<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive File Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .download-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .download-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .download-btn.downloading {
            background-color: #e67e22; /* Orange during download */
            cursor: wait;
        }
        .download-btn.downloaded {
            background-color: #2ecc71; /* Green when complete */
            color: white;
        }
        .download-btn.downloaded:hover {
            background-color: #27ae60;
        }
        .badge {
            background: rgba(255, 255, 255, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-size: 11px;
        }
    </style>
</head>

        let downloadedFiles = JSON.parse(localStorage.getItem('downloadedDriveFiles')) || [];
        const container = document.getElementById('buttonContainer');

        fileIds.forEach((id, index) => {
            const button = document.createElement('button');
            button.className = 'download-btn';
            button.dataset.id = id;
            button.innerHTML = `<span class="badge">#${index + 1}</span> ${id}`;

            if (downloadedFiles.includes(id)) {
                button.classList.add('downloaded');
            }

            button.addEventListener('click', function() {
                if (!button.classList.contains('downloading')) {
                    handleDirectDownload(id, button);
                }
            });

            container.appendChild(button);
        });

        async function handleDirectDownload(id, buttonElement) {
            // Put button into temporary downloading state (Turns Orange)
            buttonElement.classList.add('downloading');
            const originalText = buttonElement.innerHTML;
            buttonElement.innerHTML = `<span class="badge">⌛</span> Fetching...`;

            const downloadUrl = `https://drive.google.com/uc?export=download&id=${id}`;

            try {
                // Fetch the data stream directly
                const response = await fetch(downloadUrl);
                
                if (!response.ok) throw new Error('Network response failure.');
                
                const blob = await response.blob();

                // Generate a virtual download link
                const blobUrl = window.URL.createObjectURL(blob);
                const tempLink = document.createElement('a');
                tempLink.href = blobUrl;
                
                // Force filename processing
                tempLink.setAttribute('download', `file_${id}`); 
                document.body.appendChild(tempLink);
                
                // Programmatically trigger download prompt
                tempLink.click();

                // Cleanup virtual structures
                document.body.removeChild(tempLink);
                window.URL.revokeObjectURL(blobUrl);

                // Success formatting updates (Turns Green)
                buttonElement.classList.remove('downloading');
                buttonElement.classList.add('downloaded');
                buttonElement.innerHTML = originalText;

                // Save to localStorage persistence array
                if (!downloadedFiles.includes(id)) {
                    downloadedFiles.push(id);
                    localStorage.setItem('downloadedDriveFiles', JSON.stringify(downloadedFiles));
                }

            } catch (error) {
                console.error("Download pipeline error:", error);
                alert("Could not process auto-download. The file might be restricted, require a login context, or be too large for background cross-origin scripts.");
                // Reset styling back to default state
                buttonElement.classList.remove('downloading');
                buttonElement.innerHTML = originalText;
            }
        }
