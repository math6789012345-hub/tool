<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Problem Opener - Multi-Sort</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
        }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover:not(:disabled) { background-color: #218838; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status {
            font-size: 0.9rem;
            padding: 10px;
            background: #e7f3ff;
            color: #0056b3;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .badge {
            font-size: 0.75rem;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>CF Problem Opener</h2>
    <div id="status">Fetching & Sorting Data...</div>

    <div class="form-group">
        <label>1. Search Problem (by ID or Name)</label>
        <input type="text" id="search" placeholder="e.g. 158A or Watermelon" disabled>
    </div>

    <div class="form-group">
        <label>2. Start From (Sorted: Rating ↑, Solved ↓)</label>
        <select id="probSelect" disabled></select>
    </div>

    <div class="form-group">
        <label>3. How many problems to open?</label>
        <input type="number" id="countInput" value="1" min="1" max="50">
    </div>

    <button id="openBtn" disabled>Open Tabs</button>

    <p style="font-size: 0.8rem; color: #777; margin-top: 15px;">
        Note: You must allow pop-ups for this site to open multiple tabs at once.
    </p>
</div>

<script>
    let allProblems = [];

    async function init() {
        try {
            const response = await fetch('https://codeforces.com/api/problemset.problems');
            const data = await response.json();
            
            if (data.status !== "OK") throw new Error();

            const probs = data.result.problems;
            const stats = data.result.problemStatistics;

            allProblems = probs.map((p, i) => ({
                id: `${p.contestId}${p.index}`,
                name: p.name,
                url: `https://codeforces.com/problemset/problem/${p.contestId}/${p.index}`,
                rating: p.rating || 9999, // Treat unrated as very high
                solvedCount: stats[i].solvedCount,
                searchKey: `${p.contestId}${p.index} ${p.name}`.toLowerCase()
            }));

            // PRIMARY SORT: Rating (Low to High)
            // SECONDARY SORT: Solved Count (High to Low)
            allProblems.sort((a, b) => {
                if (a.rating !== b.rating) {
                    return a.rating - b.rating;
                }
                return b.solvedCount - a.solvedCount;
            });

            document.getElementById('status').innerText = "Sorted by Rating (Asc) then Popularity (Desc)";
            document.getElementById('search').disabled = false;
            document.getElementById('probSelect').disabled = false;
            document.getElementById('openBtn').disabled = false;

            renderList("");
        } catch (e) {
            document.getElementById('status').innerText = "Failed to load Codeforces data.";
            document.getElementById('status').style.background = "#ffdce0";
        }
    }

    function renderList(filter) {
        const select = document.getElementById('probSelect');
        const cleanFilter = filter.toLowerCase().replace(/\s/g, '');
        
        const filtered = allProblems.filter(p => 
            p.searchKey.replace(/\s/g, '').includes(cleanFilter)
        ).slice(0, 300); // UI Performance limit

        select.innerHTML = filtered.map(p => {
            const globalIdx = allProblems.indexOf(p);
            const displayRating = p.rating === 9999 ? 'Unrated' : p.rating;
            return `<option value="${globalIdx}">[R:${displayRating}] ${p.id} - ${p.name} (${p.solvedCount} solves)</option>`;
        }).join('');
    }

    document.getElementById('search').addEventListener('input', (e) => {
        renderList(e.target.value);
    });

    document.getElementById('openBtn').addEventListener('click', () => {
        const startIdx = parseInt(document.getElementById('probSelect').value);
        const count = parseInt(document.getElementById('countInput').value);
        
        if (isNaN(startIdx)) return alert("Select a starting problem.");

        const endIdx = Math.min(startIdx + count, allProblems.length);
        
        for (let i = startIdx; i < endIdx; i++) {
            window.open(allProblems[i].url, '_blank');
        }
    });

    init();
</script>

</body>
</html>
