<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page title</title>
<style>
.contest-container {
    border: 1px solid black;
}
</style>
</head>
<body>
<div id="contests-container"></div>
<script>
async function get_contests() {
    let contests = await fetch("https://codeforces.com/api/contest.list");
    contests = await contests.json();
    contests = contests.result;
    let problems = await fetch("https://codeforces.com/api/problemset.problems");
    problems = await problems.json();
    problems = problems.result.problems;
    let solved_problems = await fetch("https://codeforces.com/api/user.status?handle=_kashem_");
    solved_problems = await solved_problems.json();
    solved_problems = solved_problems.result;
    
    contests_object = {};
    for(let contest of contests) {
        contest["problems"] = [];
        contests_object[contest.id] = contest;
    }
    
    solved_problems_array = [];
    for(let solved_problem of solved_problems) {
        if(solved_problem.problem.problemsetName !== "acmsguru" && solved_problem.verdict === "OK") {
            solved_problems_array.push(solved_problem.problem.contestId + solved_problem.problem.index);
        }
    }
    solved_problems_array = [...new Set(solved_problems_array)];
    
    for(let problem of problems) {
        if(!solved_problems_array.includes(problem.contestId + problem.index)) {
            contests_object[problem.contestId]["problems"].push(problem);
        }
    }
    
    contests_array = Object.values(contests_object);
    
    return contests_array;
}

function show_contests(contests) {
    let contests_container = document.querySelector("#contests-container");
    
    contests = contests.sort((a, b) => {
        return b.problems.some(problem => problem.index === "A") - a.problems.some(problem => problem.index === "A");
    });
    contests = contests.sort((a, b) => {
        if(a.name.toLowerCase().includes("div. 4") || b.name.toLowerCase().includes("div. 4")) {
            return b.name.toLowerCase().includes("div. 4") - a.name.toLowerCase().includes("div. 4");
        } else if(a.name.toLowerCase().includes("div. 3") || b.name.toLowerCase().includes("div. 3")) {
            return b.name.toLowerCase().includes("div. 3") - a.name.toLowerCase().includes("div. 3");
        } else {
            return 0;
        }
    });
    
    contests.forEach(contest => {
        let contest_container = document.createElement("div");
        contest_container.classList.add("contest-container");
        contests_container.appendChild(contest_container);
        
        contest_container.innerHTML += `<span class="contest-name">${contest.name}</span>`;
        
        let contest_problems = document.createElement("div");
        contest_problems.classList.add("contest-problems");
        contest.problems.forEach(problem => {
            contest_problems.innerHTML += `<span class="contest-problem">${problem.contestId + problem.index}</span><br>`
        });
        contest_container.appendChild(contest_problems);
        
        let contest_open_button = document.createElement("button");
        contest_open_button.classList.add("contest-open-button");
        contest_open_button.innerText += `Open`;
        contest_open_button.addEventListener("click", () => {
            contest.problems.forEach(problem => window.open(`https://codeforces.com/problemset/problem/${problem.contestId}/${problem.index}`, "_blank"))
        });
        contest_container.appendChild(contest_open_button);
    });
}

async function init() {
    let contests = await get_contests();
    show_contests(contests);
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
